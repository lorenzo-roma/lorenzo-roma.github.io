<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorenzo — Director</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --fg: #e2ddd6;
      --muted: #6a6560;
      --border: #1c1c1c;
      --overlay-bg: rgba(0,0,0,0.88);
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      cursor: crosshair;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
      mix-blend-mode: normal;
    }

    .nav-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 17px;
      letter-spacing: 0.04em;
      color: var(--fg);
    }

    .nav-links {
      display: flex;
      gap: 36px;
    }

    .nav-links a {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s;
    }

    .nav-links a:hover { color: var(--fg); }

    /* GRID */
    main {
      padding-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 60vh 40vh;
      gap: 2px;
      background: var(--border);
      min-height: 100vh;
    }

    /* Hero spans full width, top row */
    .tile-hero {
      grid-column: 1 / -1;
      grid-row: 1;
    }

    /* 3 smaller tiles, bottom row — but we only have 3 so second row fits all */
    .tile-small {
      grid-row: 2;
    }

    /* Last small tile spans remaining space */
    .tile-small:last-child {
      /* handled naturally by 3 cols if we switch to 3 cols in row 2 */
    }

    /* Re-layout: hero full width top, 3 equal tiles bottom */
    .grid {
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 58vh 42vh;
    }

    .tile-hero {
      grid-column: 1 / -1;
      grid-row: 1;
    }

    .tile-small {
      grid-column: auto;
      grid-row: 2;
    }

    /* TILE */
    .tile {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #111;
    }

    .tile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.9s cubic-bezier(0.25, 0.05, 0.1, 1);
      filter: brightness(0.82);
    }

    .tile:hover .tile-img {
      transform: scale(1.045);
      filter: brightness(0.72);
    }

    /* Placeholder when no image */
    .tile-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      transition: background 0.4s;
    }

    .tile:hover .tile-placeholder {
      background: #161616;
    }

    .placeholder-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #252525;
      font-family: 'Montserrat', sans-serif;
    }

    /* Title reveal */
    .tile-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 48px 32px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.35s, transform 0.35s;
    }

    .tile:hover .tile-label {
      opacity: 1;
      transform: translateY(0);
    }

    .tile-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 26px;
      color: #f0ebe2;
      line-height: 1.15;
    }

    .tile-hero .tile-title {
      font-size: 38px;
    }

    /* Subtle always-visible number */
    .tile-number {
      position: absolute;
      top: 22px;
      right: 24px;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: #2a2a2a;
      font-family: 'Montserrat', sans-serif;
      transition: color 0.3s;
    }

    .tile:hover .tile-number { color: #444; }

    /* FOOTER */
    footer {
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 0.5px solid #1a1a1a;
    }

    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: #2e2e2e;
    }

    .footer-contact {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2e2e2e;
      transition: color 0.25s;
    }

    .footer-contact:hover { color: var(--muted); }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--overlay-bg);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 60px 40px 40px;
      cursor: default;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-close {
      position: absolute;
      top: 28px;
      right: 36px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: var(--fg); }

    .lightbox-img-wrap {
      max-width: 900px;
      width: 100%;
      max-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      display: block;
    }

    /* Placeholder in lightbox */
    .lightbox-placeholder {
      width: 100%;
      max-width: 900px;
      height: 52vh;
      background: #111;
      border: 0.5px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .lightbox-placeholder span {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    .lightbox-meta {
      text-align: center;
    }

    .lightbox-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 32px;
      color: var(--fg);
      margin-bottom: 10px;
    }

    .lightbox-desc {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.8;
    }

    /* Nav arrows */
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s;
      padding: 12px;
      user-select: none;
    }

    .lightbox-nav:hover { color: var(--fg); }
    .lightbox-prev { left: 24px; }
    .lightbox-next { right: 80px; }

    /* Page load fade */
    body {
      animation: pagefade 0.8s ease both;
    }

    @keyframes pagefade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-name">Lorenzo</div>
    <div class="nav-links">
      <a href="#work">Work</a>
      <a href="#" onclick="openContact(); return false;">Contact</a>
    </div>
  </nav>

  <main id="work">
    <div class="grid">

      <!-- HERO: L'Autografo -->
      <div class="tile tile-hero" onclick="openLightbox(0)">
        <!--
          TO ADD IMAGE: replace the tile-placeholder div below with:
          <img class="tile-img" src="images/lautografo.jpg" alt="L'Autografo" />
        -->
        <div class="tile-placeholder">
          <span class="placeholder-label">L'Autografo — add still here</span>
        </div>
        <span class="tile-number">01</span>
        <div class="tile-label">
          <div class="tile-title">L'Autografo</div>
        </div>
      </div>

      <!-- SMALL: How was the gig? -->
      <div class="tile tile-small" onclick="openLightbox(1)">
        <!--
          TO ADD IMAGE: replace the tile-placeholder div below with:
          <img class="tile-img" src="images/howwasthegig.jpg" alt="How was the gig?" />
        -->
        <div class="tile-placeholder">
          <span class="placeholder-label">Add still here</span>
        </div>
        <span class="tile-number">02</span>
        <div class="tile-label">
          <div class="tile-title">How was the gig?</div>
        </div>
      </div>

      <!-- SMALL: Suzanne -->
      <div class="tile tile-small" onclick="openLightbox(2)">
        <!--
          TO ADD IMAGE: replace the tile-placeholder div below with:
          <img class="tile-img" src="images/suzanne.jpg" alt="Suzanne" />
        -->
        <div class="tile-placeholder">
          <span class="placeholder-label">Add still here</span>
        </div>
        <span class="tile-number">03</span>
        <div class="tile-label">
          <div class="tile-title">Suzanne</div>
        </div>
      </div>

      <!-- SMALL: Dostoevskyi on the Bridge -->
      <div class="tile tile-small" onclick="openLightbox(3)">
        <!--
          TO ADD IMAGE: replace the tile-placeholder div below with:
          <img class="tile-img" src="images/dostoevskyi.jpg" alt="Dostoevskyi on the Bridge" />
        -->
        <div class="tile-placeholder">
          <span class="placeholder-label">Add still here</span>
        </div>
        <span class="tile-number">04</span>
        <div class="tile-label">
          <div class="tile-title">Dostoevskyi on the Bridge</div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-name">Lorenzo — Director &amp; Screenwriter</div>
    <a class="footer-contact" href="mailto:loreroma265@gmail.com">loreroma265@gmail.com</a>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
    <span class="lightbox-close" onclick="closeLightbox()">Close</span>
    <span class="lightbox-nav lightbox-prev" onclick="navigate(-1); event.stopPropagation();">← Prev</span>
    <span class="lightbox-nav lightbox-next" onclick="navigate(1); event.stopPropagation();">Next →</span>

    <div class="lightbox-img-wrap" id="lightbox-img-wrap">
      <!-- image or placeholder injected here -->
    </div>

    <div class="lightbox-meta">
      <div class="lightbox-title" id="lightbox-title"></div>
      <div class="lightbox-desc" id="lightbox-desc"></div>
    </div>
  </div>

  <script>
    const films = [
      {
        title: "L'Autografo",
        desc: "",
        // img: "images/lautografo.jpg"   ← uncomment and set path when ready
      },
      {
        title: "How was the gig?",
        desc: "",
        // img: "images/howwasthegig.jpg"
      },
      {
        title: "Suzanne",
        desc: "",
        // img: "images/suzanne.jpg"
      },
      {
        title: "Dostoevskyi on the Bridge",
        desc: "",
        // img: "images/dostoevskyi.jpg"
      }
    ];

    let current = 0;

    function openLightbox(index) {
      current = index;
      render();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + films.length) % films.length;
      render();
    }

    function render() {
      const f = films[current];
      document.getElementById('lightbox-title').textContent = f.title;
      document.getElementById('lightbox-desc').textContent = f.desc;

      const wrap = document.getElementById('lightbox-img-wrap');
      if (f.img) {
        wrap.innerHTML = `<img src="${f.img}" alt="${f.title}" />`;
      } else {
        wrap.innerHTML = `<div class="lightbox-placeholder"><span>Still — ${f.title}</span></div>`;
      }
    }

    function handleLightboxClick(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    function openContact() {
      window.location.href = 'mailto:loreroma265@gmail.com';
    }
  </script>

</body>
</html>
